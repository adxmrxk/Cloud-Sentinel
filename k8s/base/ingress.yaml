apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudsentinel-ingress
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - cloudsentinel.example.com
      secretName: cloudsentinel-tls
  rules:
    - host: cloudsentinel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reporter-service
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: reporter-service
                port:
                  number: 8000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
