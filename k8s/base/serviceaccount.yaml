apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudsentinel-sa
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel
  annotations:
    # AWS IRSA annotation (replace with your role ARN)
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/cloudsentinel-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudsentinel-role
  namespace: cloudsentinel
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudsentinel-rolebinding
  namespace: cloudsentinel
subjects:
  - kind: ServiceAccount
    name: cloudsentinel-sa
    namespace: cloudsentinel
roleRef:
  kind: Role
  name: cloudsentinel-role
  apiGroup: rbac.authorization.k8s.io
