apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudsentinel-audit
  namespace: cloudsentinel
  labels:
    app.kubernetes.io/name: cloudsentinel
    app.kubernetes.io/component: scheduler
spec:
  schedule: "0 0 * * *"  # Daily at midnight UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800  # 30 minutes max
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cloudsentinel
            app.kubernetes.io/component: audit-job
        spec:
          serviceAccountName: cloudsentinel-sa
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: auditor
              image: cloudsentinel/auditor:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting CloudSentinel Multi-Cloud Audit..."
                  dotnet Auditor.dll --full-scan
                  echo "Audit complete!"
              envFrom:
                - configMapRef:
                    name: cloudsentinel-config
                - secretRef:
                    name: cloudsentinel-secrets
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
