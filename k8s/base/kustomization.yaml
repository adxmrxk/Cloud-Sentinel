apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloudsentinel

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - serviceaccount.yaml
  - redis-deployment.yaml
  - auditor-deployment.yaml
  - reporter-deployment.yaml
  - ingress.yaml
  - hpa.yaml
  - cronjob.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

images:
  - name: cloudsentinel/auditor
    newTag: latest
  - name: cloudsentinel/reporter
    newTag: latest
