{{- if .Values.auditor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudsentinel.fullname" . }}-auditor
  labels:
    {{- include "cloudsentinel.auditor.labels" . | nindent 4 }}
spec:
  {{- if not .Values.auditor.autoscaling.enabled }}
  replicas: {{ .Values.auditor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudsentinel.name" . }}-auditor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudsentinel.name" . }}-auditor
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ include "cloudsentinel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: auditor
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.auditor.image.repository }}:{{ .Values.auditor.image.tag }}"
          imagePullPolicy: {{ .Values.auditor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $key, $value := .Values.auditor.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: AWS_REGION
              value: {{ .Values.cloudProviders.aws.region | quote }}
          envFrom:
            - secretRef:
                name: {{ include "cloudsentinel.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.auditor.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
