{{- if .Values.reporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudsentinel.fullname" . }}-reporter
  labels:
    {{- include "cloudsentinel.reporter.labels" . | nindent 4 }}
spec:
  {{- if not .Values.reporter.autoscaling.enabled }}
  replicas: {{ .Values.reporter.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudsentinel.name" . }}-reporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudsentinel.name" . }}-reporter
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: {{ include "cloudsentinel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: reporter
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.reporter.image.repository }}:{{ .Values.reporter.image.tag }}"
          imagePullPolicy: {{ .Values.reporter.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.reporter.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: REDIS_HOST
              value: "{{ include "cloudsentinel.fullname" . }}-redis-master"
          envFrom:
            - secretRef:
                name: {{ include "cloudsentinel.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.reporter.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudsentinel.fullname" . }}-reporter
  labels:
    {{- include "cloudsentinel.reporter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.reporter.service.type }}
  ports:
    - port: {{ .Values.reporter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "cloudsentinel.name" . }}-reporter
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
