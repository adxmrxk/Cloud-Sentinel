apiVersion: v2
name: cloudsentinel
description: Enterprise Multi-Cloud Security Governance Platform
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - security
  - cloud
  - governance
  - aws
  - azure
  - gcp
  - kubernetes

home: https://github.com/yourusername/cloudsentinel
sources:
  - https://github.com/yourusername/cloudsentinel

maintainers:
  - name: Adam
    email: adam@example.com

dependencies:
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: grafana
    version: "7.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: prometheus
    version: "25.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
